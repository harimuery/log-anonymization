global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'warning'
      repeat_interval: 2h

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/actuator/alerts'
        send_resolved: true
  - name: 'critical'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/actuator/alerts'
        send_resolved: true
  - name: 'warning'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/actuator/alerts'
        send_resolved: true